version: '3.9'

networks:
  logyca-network:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: logyca-postgres
    networks:
      - logyca-network
    environment:
      POSTGRES_DB: logyca_db
      POSTGRES_USER: logyca
      POSTGRES_PASSWORD: logyca123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logyca -d logyca_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: logyca-api
    networks:
      - logyca-network
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://logyca:logyca123@postgres:5432/logyca_db
    ports:
      - "8000:8000"
    volumes:
      - ".:/app"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: logyca-worker
    networks:
      - logyca-network
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://logyca:logyca123@postgres:5432/logyca_db
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-bot
    networks:
      - logyca-network
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: admin123
      WEBHOOK_URL: http://localhost:5678
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:
