version: '3.9'

networks:
  logyca-network:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: logyca-postgres
    networks:
      - logyca-network
    environment:
      POSTGRES_DB: logyca_bd
      POSTGRES_USER: logyca
      POSTGRES_PASSWORD: logyca123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logyca -d logyca_bd"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: logyca-api
    networks:
      - logyca-network
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://logyca:logyca123@postgres:5432/logyca_bd
    ports:
      - "8000:8000"
    volumes:
      - ".:/app"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: logyca-worker
    networks:
      - logyca-network
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://logyca:logyca123@postgres:5432/logyca_bd
    restart: unless-stopped

  n8n-integration:
    image: n8nio/n8n:latest
    container_name: logyca-n8n-integration
    networks:
      - logyca-network
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9000:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: admin123
      WEBHOOK_URL: http://localhost:9000
    volumes:
      - n8n_integration_data:/home/node/.n8n

  metabase:
    image: metabase/metabase:latest
    container_name: logyca-metabase
    networks:
      - logyca-network
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    # ← SIN variables MB_DB_* — Metabase guarda su config interna en el volumen (H2)
    # logyca_bd se conecta SOLO como fuente de datos desde la interfaz
    volumes:
      - metabase_data:/metabase-data
    restart: unless-stopped

volumes:
  postgres_data:
  n8n_integration_data:
  metabase_data: