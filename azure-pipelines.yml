trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - '*.md'
      - 'docs/**'

pr:
  branches:
    include:
      - main

variables:
  # Variables de infraestructura (ajustar según tu entorno real)
  ACR_NAME: 'logycaacr'
  RESOURCE_GROUP: 'rg-logyca-prueba'
  CONTAINER_APP_ENV: 'logyca-env' # Environment de Container Apps
  CONTAINER_APP_API: 'logyca-api'
  CONTAINER_APP_WORKER: 'logyca-worker'
  
  # Nombres de imagen completos
  IMAGE_API: '$(ACR_NAME).azurecr.io/logyca-api'
  IMAGE_WORKER: '$(ACR_NAME).azurecr.io/logyca-worker'
  
  # Service Connections (Deben existir en Azure DevOps)
  DOCKER_REGISTRY_SERVICE_CONNECTION: 'AzureContainerRegistry'
  AZURE_SUBSCRIPTION_SERVICE_CONNECTION: 'AzureServiceConnection'

stages:
  # -------------------------------------------------------------------------
  # STAGE: TEST
  # Ejecuta pruebas unitarias y de integración en un entorno aislado
  # -------------------------------------------------------------------------
  - stage: Test
    displayName: 'Run Tests'
    jobs:
      - job: UnitTests
        displayName: 'Unit Tests & Coverage'
        pool:
          vmImage: 'ubuntu-latest'
        
        # Postgres como contenedor de servicio para tests de integración reales
        services:
          postgres:
            image: postgres:16-alpine
            env:
              POSTGRES_USER: logyca
              POSTGRES_PASSWORD: logyca123
              POSTGRES_DB: logyca_db
            ports:
              - 5432:5432
        
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'
            displayName: 'Use Python 3.11'

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: 'Install Dependencies'

          # Crear .env temporal para tests apuntando al servicio postgres local
          - script: |
              echo "DATABASE_URL=postgresql://logyca:logyca123@localhost:5432/logyca_db" > .env
              echo "AZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=https;AccountName=test;AccountKey=test;EndpointSuffix=core.windows.net" >> .env
              echo "AZURE_BLOB_CONTAINER_NAME=csv-uploads" >> .env
              echo "AZURE_QUEUE_NAME=csv-processing-queue" >> .env
              echo "APP_ENV=test" >> .env
            displayName: 'Create Test .env'

          # Inicializar DB (si usas migraciones, aquí iría 'alembic upgrade head' o similar)
          # Como usas scripts SQL planos, podrías ejecutarlos con psql si fuera necesario,
          # pero tu código crea tablas con IF NOT EXISTS al arrancar, lo cual es suficiente para tests.

          - script: |
              pytest tests/ --doctest-modules --junitxml=test-results.xml --cov=api --cov=services --cov=worker --cov=repositories --cov-report=xml
            displayName: 'Run Pytest'
            env:
              # Si necesitas secrets reales para tests de integración con Azure, pásalos aquí
              # AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING_TEST)
              # pass # ELIMINADO: 'pass' no es válido aquí, era un error de sintaxis

          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFiles: '**/test-results.xml'
              testRunTitle: 'Python $(python.version)'
            displayName: 'Publish Test Results'

          - task: PublishCodeCoverageResults@2
            inputs:
              codeCoverageTool: Cobertura
              summaryFileLocation: '$(System.DefaultWorkingDirectory)/**/coverage.xml'
            displayName: 'Publish Code Coverage'

  # -------------------------------------------------------------------------
  # STAGE: BUILD
  # Construye imágenes Docker y las sube al Azure Container Registry (ACR)
  # Se ejecuta solo si los tests pasaron exitosamente
  # -------------------------------------------------------------------------
  - stage: Build
    displayName: 'Build and Push Images'
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: BuildImages
        displayName: 'Build Docker Images'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          # Build & Push API
          - task: Docker@2
            displayName: 'Build & Push API'
            inputs:
              containerRegistry: '$(DOCKER_REGISTRY_SERVICE_CONNECTION)'
              repository: 'logyca-api'
              command: 'buildAndPush'
              Dockerfile: 'Dockerfile.api'
              tags: |
                $(Build.BuildId)
                latest

          # Build & Push Worker
          - task: Docker@2
            displayName: 'Build & Push Worker'
            inputs:
              containerRegistry: '$(DOCKER_REGISTRY_SERVICE_CONNECTION)'
              repository: 'logyca-worker'
              command: 'buildAndPush'
              Dockerfile: 'Dockerfile.worker'
              tags: |
                $(Build.BuildId)
                latest

  # -------------------------------------------------------------------------
  # STAGE: DEPLOY
  # Despliega las nuevas imágenes en Azure Container Apps
  # Solo se ejecuta en la rama 'main'
  # -------------------------------------------------------------------------
  - stage: Deploy
    displayName: 'Deploy to Azure Container Apps'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DeployContainerApps
        displayName: 'Update Container Apps'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          # Desplegar API
          - task: AzureContainerApps@1
            displayName: 'Deploy API'
            inputs:
              azureSubscription: '$(AZURE_SUBSCRIPTION_SERVICE_CONNECTION)'
              acrName: '$(ACR_NAME)'
              imageToDeploy: '$(IMAGE_API):$(Build.BuildId)'
              containerAppName: '$(CONTAINER_APP_API)'
              resourceGroup: '$(RESOURCE_GROUP)'
              targetPort: 8000
              # environmentVariables: # Descomentar si quieres inyectar variables en deployment
              #   DATABASE_URL: $(DATABASE_URL_PROD) 

          # Desplegar Worker
          - task: AzureContainerApps@1
            displayName: 'Deploy Worker'
            inputs:
              azureSubscription: '$(AZURE_SUBSCRIPTION_SERVICE_CONNECTION)'
              acrName: '$(ACR_NAME)'
              imageToDeploy: '$(IMAGE_WORKER):$(Build.BuildId)'
              containerAppName: '$(CONTAINER_APP_WORKER)'
              resourceGroup: '$(RESOURCE_GROUP)'
